    <main>

        <section class="calculator">
            <h2 class="calculator-title">費用シミュレーション</h2>
            <p class="calculator-lead">お住まいの地域とサービス内容を選択し、<br>費用をシミュレーションします。<br>
                設定した金額で地域調整費と配送料/出張費を加算します。</p>

            <div class="calculator-input-group">
                <label for="service" class="calculator-input-label">サービス内容</label>
                <select id="service" class="js-input-service calculator-input-select">
                    <option value="" disabled selected>--選択してください--</option>
                    <option value="50000">簡易クリーニング (¥50,000〜)</option>
                    <option value="150000">標準リフォーム (¥150,000〜)</option>
                    <option value="500000">フルパッケージ (¥500,000〜)</option>
                </select>
            </div>

            <div class="calculator-input-group">
                <label for="area" class="calculator-input-label">お住まいの地域</label>
                <select id="area" class="js-input-area calculator-input-select">
                    <option value="" disabled selected>--選択してください--</option>
                    <option value="TOKYO">東京都</option>
                    <option value="OSAKA">大阪府</option>
                    <option value="OKINAWA">沖縄県</option>
                    <option value="DEFAULT">その他地域</option>
                </select>
            </div>

            <hr class="calculator-hr">

            <div class="calculator-result-area">
                <div class="calculator-result-item">
                    <span>基本料金:</span>
                    <span class="js-display-base">¥0</span>
                </div>
                <div class="calculator-result-item">
                    <span>地域調整費:</span>
                    <span class="js-display-adj">¥0</span>
                </div>
                <div class="calculator-result-item">
                    <span>配送料/出張費:</span>
                    <span class="js-display-ship">¥0</span>
                </div>
                <div class="calculator-result-total">
                    <span>合計見積額:</span>
                    <span class="js-display-total">¥0</span>
                </div>
            </div>
        </section>

    </main>
